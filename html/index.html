            <form id="formRegisterStudent">
            <div class="row">
              <div class="col-md-3 mb-4 col-sm-12">
                <label for="emailBackdrop" class="form-label">Ficha</label>
                <input type="number" maxlength="15" name="ficha" class="form-control" placeholder="Ficha"  />
              </div>

              <div class="col-md-5 mb-4 col-sm-12">
                <label for="dobBackdrop" class="form-label">Programa de Formación <span class="text-danger">*</span></label>
                <input type="text" name="programa_formacion" class="form-control"  />
              </div>

              <div class="col-md-4 mb-4 col-sm-12">
                <label for="dobBackdrop" class="form-label">Tipo Documento <span class="text-danger">*</span></label>
                <select name="tipo_documento" id="" class="form-select" >
                  <option class="" value="" disabled selected>Seleccione</option>
                  <option class="" value="CC">C.C</option>
                  <option class="" value="TI">T.I</option>
                  <option class="" value="CE">C.E</option>
                  <option class="" value="PPT">PPT</option>
                  <option class="" value="Pasaporte">Pasaporte</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="col-md-4 mb-4 col-sm-12">
                <label for="emailBackdrop" class="form-label">N° de Documento <span class="text-danger">*</span></label>
                <input type="number" name="numero_documento" class="form-control" placeholder="Ingresa tu documento"  />
              </div>

              <div class="col-md-4 mb-4 col-sm-12">
                <label for="dobBackdrop" class="form-label">Nombre del Aprendiz  <span class="text-danger">*</span></label>
                <input type="text" name="nombre_aprendiz" class="form-control" placeholder="Ingresa tu nombre"  />
              </div>

              <div class="col-md-4 mb-4 col-sm-12">
                <label for="dobBackdrop" class="form-label">Teléfono</label>
                <input type="tel" name="telefono" class="form-control" placeholder="Ingresa tu teléfono"  />
              </div>
            </div>

            <div class="row">
              <div class="col-md-4 mb-4 col-sm-12">
                <label for="emailBackdrop" class="form-label">Correo  <span class="text-danger">*</span></label>
                <input type="email" name="email" id="email_student" class="form-control" placeholder="Ingresa tu correo"  />
              </div>

              <div class="col-md-4 mb-4 col-sm-12">
                <label for="dobBackdrop" class="form-label">Fecha Inicio Etapa</label>
                <input type="date" class="form-control" name="fecha_inicio_etapa" id=""  />
              </div>

              <div class="col-md-4 mb-4 col-sm-12">
                <label for="dobBackdrop" class="form-label">Fecha Fin Etapa</label>
                <input type="date" class="form-control" name="fecha_fin_etapa" id=""  />
              </div>
            </div>

            <div class="row">

                <label for="emailBackdrop" class="form-label">Contraseña <span class="text-danger">*</span> </label>

                    <i class="bx bx-hide" id="icon_eye_student"></i>
                  </span>
                </div>
              </div>
            </div>
